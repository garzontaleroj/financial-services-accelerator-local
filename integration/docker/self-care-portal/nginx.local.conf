server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;

    # ── Proxy to WSO2 IS (fs-is:9443) ────────────────────────────────────────
    # These paths must be served by the IS, not by nginx.
    # Without IS running you will see a connection error instead of an
    # infinite redirect loop.

    # OAuth2 token endpoint
    location /oauth2/ {
        proxy_pass https://fs-is:9443/oauth2/;
        proxy_ssl_verify off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SCP OAuth2 authorize/callback (handled by IS, not by the React SPA)
    location /consentmgr/scp_oauth2_authorize {
        proxy_pass https://fs-is:9443/consentmgr/scp_oauth2_authorize;
        proxy_ssl_verify off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /consentmgr/scp_oauth2_callback {
        proxy_pass https://fs-is:9443/consentmgr/scp_oauth2_callback;
        proxy_ssl_verify off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SCP backend API (consent data etc.)
    location /consentmgr/scp {
        proxy_pass https://fs-is:9443/consentmgr/scp;
        proxy_ssl_verify off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OIDC logout
    location /oidc/ {
        proxy_pass https://fs-is:9443/oidc/;
        proxy_ssl_verify off;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static React SPA ─────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /usr/share/nginx/html/consentmgr/Logo.ico;
        access_log off;
    }

    # Webpack bundles (immutable)
    location /consentmgr/dist/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # runtime-config.js – never cache (IS URL must always be current)
    location = /consentmgr/runtime-config.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA entry point – serve index.html for all React client routes
    # Note: scp_oauth2_authorize and scp_oauth2_callback are proxied above
    # and will NOT fall through to this block.
    location /consentmgr/ {
        try_files $uri $uri/ /consentmgr/index.html;
    }

    # Redirect bare root
    location = / {
        return 302 /consentmgr/;
    }

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
