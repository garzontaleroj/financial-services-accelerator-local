# ─── Application ────────────────────────────────────────────────────────────
quarkus.application.name=ob-consent-service
quarkus.application.version=1.0.0

# ─── HTTP ────────────────────────────────────────────────────────────────────
quarkus.http.port=8081
quarkus.http.cors=true
quarkus.http.cors.origins=https://portal.apps.${CLUSTER_DOMAIN:example.com}

# ─── Database ────────────────────────────────────────────────────────────────
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ob_consent}?useSSL=true&requireSSL=false
quarkus.datasource.username=${DB_USER:obuser}
quarkus.datasource.password=${DB_PASS:changeme}
quarkus.datasource.jdbc.min-size=5
quarkus.datasource.jdbc.max-size=20

# ─── Hibernate ───────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ─── Flyway ──────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration

# ─── OIDC — Keycloak ─────────────────────────────────────────────────────────
# Validates JWT tokens issued by Keycloak (replaces WSO2 IS token validation)
quarkus.oidc.auth-server-url=https://${KEYCLOAK_HOST:keycloak.apps.example.com}/realms/${KEYCLOAK_REALM:openbanking}
quarkus.oidc.client-id=ob-consent-service
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=https://${KEYCLOAK_HOST:keycloak.apps.example.com}/realms/${KEYCLOAK_REALM:openbanking}

# ─── Kafka / AMQ Streams ─────────────────────────────────────────────────────
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}
mp.messaging.outgoing.consent-events.connector=smallrye-kafka
mp.messaging.outgoing.consent-events.topic=ob-consent-events
mp.messaging.outgoing.consent-events.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# ─── OpenAPI ─────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui
mp.openapi.extensions.smallrye.info.title=OB Consent Service API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Open Banking Consent Management — Red Hat Native

# ─── Health ──────────────────────────────────────────────────────────────────
quarkus.smallrye-health.root-path=/q/health

# ─── Logging ─────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."io.openbanking".level=DEBUG

# ─── Dev / Test overrides ────────────────────────────────────────────────────
%dev.quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/ob_consent_dev?useSSL=false
%dev.quarkus.oidc.enabled=false
%dev.quarkus.security.auth.enabled-in-dev-mode=false
%dev.kafka.bootstrap.servers=localhost:9092

%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.oidc.enabled=false
%test.quarkus.flyway.enabled=false
