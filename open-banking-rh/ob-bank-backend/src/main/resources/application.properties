quarkus.application.name=ob-bank-backend
quarkus.application.version=1.0.0
quarkus.http.port=8083

# OIDC — validate Keycloak tokens (replaces WSO2 Carbon token validation)
quarkus.oidc.auth-server-url=https://${KEYCLOAK_HOST:keycloak.apps.example.com}/realms/${KEYCLOAK_REALM:openbanking}
quarkus.oidc.client-id=ob-bank-backend
quarkus.oidc.application-type=service

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
quarkus.swagger-ui.always-include=true
mp.openapi.extensions.smallrye.info.title=OB Bank Backend API
mp.openapi.extensions.smallrye.info.version=1.0.0
mp.openapi.extensions.smallrye.info.description=Mock Bank API — Open Banking UK compatible

# Health + Metrics
quarkus.smallrye-health.root-path=/q/health

# Dev / Test
%dev.quarkus.oidc.enabled=false
%dev.quarkus.security.auth.enabled-in-dev-mode=false
%test.quarkus.oidc.enabled=false
