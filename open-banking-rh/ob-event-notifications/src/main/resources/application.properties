quarkus.application.name=ob-event-notifications
quarkus.http.port=8082

# Database
quarkus.datasource.db-kind=mysql
quarkus.datasource.jdbc.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:ob_events}?useSSL=true&requireSSL=false
quarkus.datasource.username=${DB_USER:obuser}
quarkus.datasource.password=${DB_PASS:changeme}
quarkus.flyway.migrate-at-start=true

# OIDC
quarkus.oidc.auth-server-url=https://${KEYCLOAK_HOST:keycloak.apps.example.com}/realms/${KEYCLOAK_REALM:openbanking}
quarkus.oidc.application-type=service

# Kafka — consume consent events from ob-consent-service
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP:localhost:9092}
mp.messaging.incoming.consent-events-in.connector=smallrye-kafka
mp.messaging.incoming.consent-events-in.topic=ob-consent-events
mp.messaging.incoming.consent-events-in.value.deserializer=io.quarkus.kafka.client.serialization.ObjectMapperDeserializer
mp.messaging.incoming.consent-events-in.value.deserializer.type=java.util.Map
mp.messaging.incoming.consent-events-in.group.id=ob-event-notifications

# OpenAPI
quarkus.smallrye-openapi.path=/openapi
mp.openapi.extensions.smallrye.info.title=OB Event Notifications API
mp.openapi.extensions.smallrye.info.version=1.0.0

%dev.quarkus.oidc.enabled=false
%test.quarkus.oidc.enabled=false
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:test
%test.quarkus.flyway.enabled=false
